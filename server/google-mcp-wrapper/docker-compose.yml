services:
  google-mcp-wrapper:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    volumes:
      - ./policy:/app/policy:ro
      - ./data:/app/data
    networks:
      - mcp_internal
    ports: []

networks:
  mcp_internal:
    internal: true
